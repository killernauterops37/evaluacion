<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Repuestos Samuel Guzmán</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header class="navbar">
        <div class="logo-section">
            <div class="logo-box">LOGO</div>
            <span class="company-name">REPUESTOS SAMUEL GUZMÁN</span>
        </div>
        
        <nav class="main-nav">
            <ul class="nav-list">
                <li class="nav-item"><a href="login.html">INICIAR SESION</a></li>
                <li class="nav-item"><a href="index.html">INICIO</a></li>
                <li class="nav-item"><a href="galeria.html">GALERIA</a></li>
            </ul>
        </nav>
    </header>

    <section class="hero-banner">
        <h2>PIEZAS Y ACCESORIOS <span>(Lo mejor para tu motor)</span></h2>
    </section>

    <main class="login-main-container">
        <div class="login-card">
            <h3>INICIAR SESION</h3>
            
            <form class="login-form">
                <div class="form-group">
                    <label for="email">Email</label>
                    <input type="email" id="email" name="email" placeholder="ejemplo@correo.com" required>
                </div>

                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" name="password" required>
                </div>

                <div class="button-container">
                    <button type="submit" class="btn-submit">LOGIN</button>
                </div>
            </form>
        </div>
    </main>

    <footer class="footer">
        <div class="footer-label">FOOTER</div>
        <div class="footer-credit">SITIO DESARROLLADO POR: SAMUEL GUZMÁN</div>
    </footer>

</body>
</html>
